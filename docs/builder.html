<script>
/*
  Super Search Builder — classic responsive renderer
  ---------------------------------------------------
  Based on the start page builder's known-good classic menu, adapted so that each
  button is a SEARCH TEMPLATE (URL with a %s token). The exported page has one query
  box that rewrites every button's href live, fanning one query out to many engines.
*/
var E = window.SuperSearchEngine;
const defaultPalette = {blue:"#4d90fe",green:"#35aa47",orange:"#d84a38",purple:"#852b99",red:"#bd121d"};
const pastelPalette  = {blue:"#8bbcff",green:"#8fd6a3",orange:"#f3aa8f",purple:"#c69ad6",red:"#e88f96"};
const allowedColours = ["blue","green","orange","purple","red"];
const allowedColourStyles = ["primary","pastel"];
const allowedOpenModes = ["links","openAll"];
const MIN_COLUMNS = 2, MAX_COLUMNS = 5, DEFAULT_COLUMNS = 3;
const STORAGE_KEY = "superSearchBuilderStage1";

function escapeHtml(str){return String(str ?? "").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;").replace(/'/g,"&#39;");}
function cleanColour(c){return allowedColours.includes(c)?c:"blue";}
function cleanColourStyle(v){return allowedColourStyles.includes(v)?v:"primary";}
function cleanOpenMode(v){return allowedOpenModes.includes(v)?v:"links";}
function cleanShowTitle(v){return v!==false && v!=="false" && v!==0 && v!=="0";}
function cleanColumnCount(v){const n=Number.parseInt(v,10);return n>=MIN_COLUMNS && n<=MAX_COLUMNS?n:DEFAULT_COLUMNS;}
function cleanSectionColumn(value, columns){const n=Number.parseInt(value,10);const max=cleanColumnCount(columns);return n>=1 && n<=max?n:null;}
function sectionWeight(section){return 1+(section.engines||[]).filter(e=>e.included!==false).length;}
function assignMissingSectionColumns(p){
  // Honour any stored column choices (clamped to the current count), then assign a
  // column ONCE to any section that lacks one, using emptiest-column balancing. After
  // that, placement is stable and only changes when the user moves a section.
  const columnCount=cleanColumnCount(p.columns);
  const counts=Array.from({length:columnCount},()=>0);
  (p.sections||[]).forEach(section=>{
    const existing=cleanSectionColumn(section.column ?? section.col ?? section.columnNumber, columnCount);
    if(existing){section.column=existing;counts[existing-1]+=sectionWeight(section);}
    else{section.column=null;}
  });
  (p.sections||[]).forEach(section=>{
    if(section.column)return;
    let targetIndex=0,fewest=Infinity;
    counts.forEach((count,i)=>{if(count<fewest){fewest=count;targetIndex=i;}});
    section.column=targetIndex+1;
    counts[targetIndex]+=sectionWeight(section);
  });
  return p;
}
function normaliseSectionOrder(p){
  // Order the sections array so it reads like the finished menu: all Column 1 sections
  // first (in their existing order), then Column 2, and so on.
  assignMissingSectionColumns(p);
  const columnCount=cleanColumnCount(p.columns);
  p.sections=(p.sections||[])
    .map((section,originalIndex)=>({section,originalIndex}))
    .sort((a,b)=>{
      const ac=cleanSectionColumn(a.section.column,columnCount)||columnCount;
      const bc=cleanSectionColumn(b.section.column,columnCount)||columnCount;
      return ac-bc || a.originalIndex-b.originalIndex;
    })
    .map(e=>e.section);
  return p;
}
function setProjectColumnCount(value){
  // Changing the column count clamps section columns into range (sections in removed
  // columns fall into the last remaining column) and keeps placement otherwise stable.
  const next=cleanColumnCount(value);
  project.columns=next;
  (project.sections||[]).forEach(section=>{const cur=Number.parseInt(section.column,10);section.column=cur>=1?Math.min(cur,next):null;});
  normaliseSectionOrder(project);
}
function findSectionIndexInColumn(sectionIndex,direction){
  const section=project.sections[sectionIndex];
  if(!section)return -1;
  const column=cleanSectionColumn(section.column,project.columns);
  if(!column)return -1;
  if(direction<0){for(let i=sectionIndex-1;i>=0;i--){if(cleanSectionColumn(project.sections[i]?.column,project.columns)===column)return i;}}
  else{for(let i=sectionIndex+1;i<project.sections.length;i++){if(cleanSectionColumn(project.sections[i]?.column,project.columns)===column)return i;}}
  return -1;
}
function moveSectionWithinColumn(sectionIndex,direction){
  const targetIndex=findSectionIndexInColumn(sectionIndex,direction);
  if(targetIndex===-1)return false;
  [project.sections[sectionIndex],project.sections[targetIndex]]=[project.sections[targetIndex],project.sections[sectionIndex]];
  return true;
}
function moveSectionSideways(sectionIndex,direction){
  // Move a section one column left/right, landing at the bottom of the destination column.
  const section=project.sections[sectionIndex];
  if(!section)return false;
  const columnCount=cleanColumnCount(project.columns);
  const current=cleanSectionColumn(section.column,columnCount)||1;
  const next=current+direction;
  if(next<1||next>columnCount)return false;
  const [moved]=project.sections.splice(sectionIndex,1);
  moved.column=next;
  let insertIndex=-1;
  project.sections.forEach((candidate,i)=>{if(cleanSectionColumn(candidate.column,columnCount)===next)insertIndex=i+1;});
  if(insertIndex===-1){
    insertIndex=project.sections.findIndex(c=>(cleanSectionColumn(c.column,columnCount)||columnCount)>next);
    if(insertIndex===-1)insertIndex=project.sections.length;
  }
  project.sections.splice(insertIndex,0,moved);
  return true;
}
function makeColumns(count){return Array.from({length:cleanColumnCount(count)},()=>({items:[]}));}
function ensureHtmlFilename(name){let f=String(name||"supersearch.html").trim()||"supersearch.html";if(!/\.html?$/i.test(f))f+=".html";return f.replace(/[\\/:*?"<>|]+/g,"-");}
function defaultProject(){return {format:"supersearch-builder-v1",title:"My Super Search",description:"",filename:"supersearch.html",columns:DEFAULT_COLUMNS,colours:"primary",showTitle:true,openMode:"links",sections:[]};}
function defaultState(){return {settings:{pageTitle:"My Super Search",menuFilename:"supersearch.html",columns:DEFAULT_COLUMNS,colours:"primary",showTitle:true,openMode:"links",theme:"light",palette:{...defaultPalette}},menu:{columns:makeColumns(DEFAULT_COLUMNS)}};}
function ensureColumnCount(menu,columns){const desired=cleanColumnCount(columns);const cols=menu.columns||[];if(cols.length<desired){while(cols.length<desired)cols.push({items:[]});menu.columns=cols;}else if(cols.length>desired){const keep=cols.slice(0,desired);const extra=cols.slice(desired);const target=keep[keep.length-1];extra.forEach(c=>target.items.push(...(c.items||[])));menu.columns=keep;}}
function colorToClasses(color){const c=cleanColour(color||"blue");return {btn:"ss-"+c+"-btn",hdr:"ss-"+c+"-hdr"};}

function buildClassicMenuCss(settings){
  const colourStyle=cleanColourStyle(settings.colours||"primary");
  const pal=colourStyle==="pastel"?pastelPalette:(settings.palette||defaultPalette);
  const isPastel=colourStyle==="pastel";
  const searchBg=isPastel?"#fbf7fa":"#fafafa";
  const searchBorder=isPastel?"#f0e6ee":"#e6e6e6";
  const headerText=isPastel?"#1a1a1a":"#fff";
  const btnBg=isPastel?"#faf8f5":"#f4f4f4";
  const btnHoverBg=isPastel?"#efe9e2":"#e4e4e4";
  const textColor="#1a1a1a";
  const linkColor="#1a4fce";
  return `
.ss-root{--ss-columns:${cleanColumnCount(settings.columns)};--ss-c-blue:${pal.blue};--ss-c-green:${pal.green};--ss-c-orange:${pal.orange};--ss-c-purple:${pal.purple};--ss-c-red:${pal.red};}
body{margin:0;padding:0;font-family:Arial,Helvetica,sans-serif;background:#fff;color:${textColor};}
.ss-masthead{text-align:center;padding:18px 15px 4px;}
.ss-masthead .ss-masthead-title{font-family:Georgia,"Times New Roman",Times,serif;font-size:30px;line-height:1.15;font-weight:700;color:${textColor};letter-spacing:.01em;}
.ss-masthead .ss-masthead-prefix{color:var(--ss-c-red);}
.ss-searchbar-wrapper{background:${searchBg};padding:14px 15px;border-bottom:1px solid ${searchBorder};}
.ss-searchbar-inner{width:84%;max-width:96em;margin:0 auto;display:flex;flex-wrap:wrap;gap:10px 14px;align-items:center;justify-content:center;}
.ss-searchbar-form{flex:1 1 560px;display:flex;flex-wrap:wrap;gap:8px;align-items:center;font-size:14px;min-width:260px;justify-content:center;}
.ss-searchbar-form input[type="text"]{flex:1 1 360px;padding:9px 11px;border:1px solid #c4c4c4;border-radius:3px;font-size:15px;min-width:0;color:${textColor};}
.ss-searchbar-form input[type="text"]:focus{outline:2px solid var(--ss-c-blue);outline-offset:0;border-color:var(--ss-c-blue);}
.ss-searchbar-form button{padding:9px 18px;border-radius:3px;border:1px solid var(--ss-c-blue);background:var(--ss-c-blue);color:${isPastel?"#1a1a1a":"#fff"};cursor:pointer;font-size:14px;font-weight:700;}
.ss-searchbar-form button:hover{filter:brightness(.92);}
.ss-searchbar-hint{flex-basis:100%;font-size:12px;color:#555;text-align:center;}
.ss-maincontent{clear:both;width:84%;font-size:.8125em;max-width:96em;margin:0 auto;padding:1em 0;color:${textColor};line-height:1.5em;position:relative;}
.ss-section{clear:both;padding:0;margin:0;}
.ss-group{display:flex;flex-wrap:wrap;gap:0 2%;}
.ss-col{box-sizing:border-box;flex:0 0 calc((100% - (var(--ss-columns) - 1)*2%)/var(--ss-columns));max-width:calc((100% - (var(--ss-columns) - 1)*2%)/var(--ss-columns));margin:1% 0;}
@media only screen and (max-width:767px){.ss-col{flex:1 1 100%;max-width:100%;margin:1% 0;}.ss-searchbar-inner,.ss-maincontent{width:100%;padding-left:0;padding-right:0;}.ss-maincontent{padding:1em 12px;width:auto;}.ss-masthead .ss-masthead-title{font-size:24px;}}
/* Each search starts as plain text and becomes a real underlined link after a query is typed. */
.ss-btn{box-sizing:border-box;text-align:left;display:block;width:100%;color:${textColor};position:relative;overflow:hidden;margin:8px 0 0;padding:9px 14px;outline:0;border-style:none none none solid;border-width:0 0 0 3px;background:transparent;z-index:1;font-family:"Segoe UI",Helvetica,Arial,sans-serif;font-size:16px;line-height:18px;text-decoration:none;white-space:nowrap;text-overflow:ellipsis;font-weight:600;cursor:default;}
.ss-btn.ss-ready{background:${btnBg};color:${linkColor};text-decoration:underline;cursor:pointer;}
.ss-btn.ss-ready:hover{background:${btnHoverBg};color:#0b2f8f;}
.ss-btn.ss-disabled-empty{opacity:1;color:${textColor};text-decoration:none;background:transparent;}
.ss-blue-btn{border-left-color:var(--ss-c-blue);}.ss-green-btn{border-left-color:var(--ss-c-green);}.ss-orange-btn{border-left-color:var(--ss-c-orange);}.ss-purple-btn{border-left-color:var(--ss-c-purple);}.ss-red-btn{border-left-color:var(--ss-c-red);}
.ss-hdr{box-sizing:border-box;text-align:left;display:block;width:100%;color:${headerText};position:relative;overflow:hidden;margin:14px 0 0;padding:10px 16px;cursor:pointer;outline:0;border:0;z-index:1;font-family:"Segoe UI",Helvetica,Arial,sans-serif;font-size:14px;line-height:14px;text-decoration:none;white-space:nowrap;text-overflow:ellipsis;font-weight:700;letter-spacing:.14em;}

function renderClassicMenuBody(menu,settings,options={}){

  body+=`<div class="ss-root">`;
  body+=mastheadMarkup;
  body+=`
<div class="ss-searchbar-wrapper">
  <div class="ss-searchbar-inner">
    <form class="ss-searchbar-form" id="ss-form" onsubmit="return false;">
      <input type="text" id="ss-input" name="q" placeholder="Type one query, then pick a search…" aria-label="Super Search query"${autofocusAttr}>
      <button type="button" id="ss-apply">Search</button>
      ${openMode==="openAll"?`<button type="button" id="ss-openall">Open all</button>`:""}
      <span class="ss-searchbar-hint">Type a query and press Search. Each link below opens that search on its own site.</span>
    </form>
  </div>
</div>
<div class="ss-maincontent">
  <div class="ss-section ss-group">
`;
  menu.columns.forEach(col=>{
    body+=`<div class="ss-col">`;
    (col.items||[]).forEach(item=>{
      const classes=colorToClasses(item.color||"blue");
      if(item.type==="header"){
        const openAllLink=openMode==="openAll"?`<span class="ss-openall" data-ss-open-all="true">open all ▸</span>`:"";
        body+=`
    <p class="ss-hdr-para">
      <button type="button" class="ss-hdr ${classes.hdr}" data-ss-section-header="true" aria-expanded="true"><b>${escapeHtml(item.text||"")}</b>${openAllLink}</button>
    </p>
`;
      }else{
        body+=`
    <a class="ss-btn ${classes.btn} ss-disabled-empty" data-ss-template="${escapeHtml(item.template||"")}" href="#" target="_blank" rel="noopener noreferrer">
      ${escapeHtml(item.text||"")}
    </a>
`;
      }
    });
    body+=`</div>`;
  });
  body+=`
  </div>
</div>
</div>`;
  return body;
}

/* Behaviour serialized into the exported page: rewrites every button href from the
   single query box, supports header collapse and optional open-all. */
function attachSuperSearchBehaviour(root,options){
  options=options||{};
  function encQuery(q){return encodeURIComponent(String(q||"").trim()).replace(/%20/g,"+");}
  function encPath(q){return encodeURIComponent(String(q||"").trim());}
  function fill(tmpl,q){
    var hi=tmpl.indexOf("#");
    var qi=tmpl.indexOf("?");
    var qStart=(qi!==-1&&(hi===-1||qi<hi))?qi:-1;
    var qEnd=hi===-1?tmpl.length:hi;
    return tmpl.replace(/%s/g,function(m,off){
      return (qStart!==-1&&off>qStart&&off<qEnd)?encQuery(q):encPath(q);
    });
  }
  var input=root.querySelector("#ss-input");
  var buttons=Array.prototype.slice.call(root.querySelectorAll("a.ss-btn[data-ss-template]"));
  function isStatic(tmpl){return tmpl.indexOf("%s")===-1;}
  function refresh(){
    var q=input?input.value:"";
    buttons.forEach(function(b){
      var tmpl=b.getAttribute("data-ss-template")||"";
      if(!tmpl){ b.setAttribute("href","#"); b.classList.add("ss-disabled-empty"); b.classList.remove("ss-ready"); return; }
      if(isStatic(tmpl)){
        // A plain destination link with no query token: always live, regardless of typing.
        b.setAttribute("href", tmpl);
        b.classList.remove("ss-disabled-empty");
        b.classList.add("ss-ready");
        return;
      }
      // A search link: stays plain text until a query is typed, then becomes a link.
      if(!q){ b.setAttribute("href","#"); b.classList.add("ss-disabled-empty"); b.classList.remove("ss-ready"); return; }
      b.setAttribute("href", fill(tmpl,q));
      b.classList.remove("ss-disabled-empty");
      b.classList.add("ss-ready");
    });
  }
  if(input){ input.addEventListener("input",refresh); }
  var applyBtn=root.querySelector("#ss-apply");
  if(applyBtn){ applyBtn.addEventListener("click",refresh); }
  // A search link with no query yet should focus the box rather than navigate; static
  // links (no %s) always navigate normally.
  buttons.forEach(function(b){
    b.addEventListener("click",function(ev){
      var tmpl=b.getAttribute("data-ss-template")||"";
      if(isStatic(tmpl)&&tmpl){ return; }
      if(!input||!input.value.trim()){ ev.preventDefault(); if(input){input.focus();} }
    });
  });
  // Collect the search links that belong to a section header (siblings until the next header).
  function sectionButtonsFromHeader(header){
    var list=[]; var p=header.parentElement; var node=p?p.nextElementSibling:null;
    while(node){
      var nextHdr=node.querySelector&&node.querySelector('[data-ss-section-header="true"]');
      if(nextHdr)break;
      if(node.tagName==="A"&&node.classList.contains("ss-btn"))list.push(node);
      node=node.nextElementSibling;
    }
    return list;
  }
  // Optional open-all (whole page or per section). Browsers may block bulk pop-ups.
  function openMany(btns){
    if(!input||!input.value.trim()){ if(input)input.focus(); return; }
    refresh();
    btns.forEach(function(b){ var href=b.getAttribute("href"); if(href&&href!=="#"){ window.open(href,"_blank","noopener"); } });
  }
  var openAllBtn=root.querySelector("#ss-openall");
  if(openAllBtn){
    openAllBtn.addEventListener("click",function(){ openMany(buttons); });
  }
  root.querySelectorAll('[data-ss-open-all="true"]').forEach(function(h){
    h.addEventListener("click",function(ev){
      ev.preventDefault(); ev.stopPropagation();
      var header=h.closest('[data-ss-section-header="true"]');
      openMany(header?sectionButtonsFromHeader(header):buttons);
    });
  });
  // Header collapse/expand: toggles the hidden attribute on the section's links and
  // reflects state with aria-expanded.
  root.querySelectorAll('[data-ss-section-header="true"]').forEach(function(h){
    h.addEventListener("click",function(){
      var links=sectionButtonsFromHeader(h);
      var collapsing=links.length?!links[0].hasAttribute("hidden"):true;
      links.forEach(function(b){ if(collapsing){ b.setAttribute("hidden",""); } else { b.removeAttribute("hidden"); } });
      h.setAttribute("aria-expanded", collapsing?"false":"true");
    });
  });
  if(options.focusSearch!==false&&input&&input.hasAttribute("autofocus")){ try{input.focus();}catch(e){} }
  refresh();
}

function exportClassicStandaloneHtml(state, projectConfig){
  const css=buildClassicMenuCss(state.settings);
  const body=renderClassicMenuBody(JSON.parse(JSON.stringify(state.menu)),state.settings,{autofocusSearch:true});
  // Embed the visible menu config so the page can be reloaded into the builder exactly,
  // without lossy HTML parsing. Only the visible/exported content is included.
  let embedded="";
  if(projectConfig){
    const safe=JSON.stringify(projectConfig).replace(/</g,"\\u003c").replace(/>/g,"\\u003e");
    embedded=`\n<script type="application/json" id="ss-menu-config">${safe}<\/script>`;
  }
  return `<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>${escapeHtml(state.settings.pageTitle||"My Super Search")}</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
${css}
  </style>
</head>
<body data-ss-skin="supersearch" data-ss-columns="${cleanColumnCount(state.settings.columns)}" data-ss-colours="${cleanColourStyle(state.settings.colours)}" data-ss-show-title="${cleanShowTitle(state.settings.showTitle)?"true":"false"}" data-ss-open-mode="${cleanOpenMode(state.settings.openMode)}">
${body}${embedded}
<script>
  (${attachSuperSearchBehaviour.toString()})(document,{});
<\/script>
</body>
</html>`;
}

/* Project data and conversion */
let project=defaultProject();
let renderQueued=false, renderQueuedMode="all";

function normaliseFriendlyProject(input){
  const p=defaultProject();
  p.title=input.title||input.settings?.pageTitle||"My Super Search";
  p.description=input.description||"";
  p.filename=ensureHtmlFilename(input.filename||"supersearch.html");
  p.columns=cleanColumnCount(input.columns);
  p.colours=cleanColourStyle(input.colours||"primary");
  p.showTitle=cleanShowTitle(input.showTitle);
  p.openMode=cleanOpenMode(input.openMode);
  p.sections=(input.sections||[]).map(section=>({
    name:section.name||"Section",
    colour:cleanColour(section.colour||"blue"),
    included:section.included!==false,
    column:cleanSectionColumn(section.column ?? section.col ?? section.columnNumber, input.columns),
    engines:(section.engines||section.links||[]).map(en=>({
      label:en.label||en.text||"Engine",
      template:en.template||en.url||"",
      colour:cleanColour(en.colour||section.colour||"blue"),
      included:en.included!==false
    }))
  }));
  assignMissingSectionColumns(p);
  return p;
}
function projectToInternalState(p){
  const state=defaultState();
  state.settings.pageTitle=p.title||"My Super Search";
  state.settings.menuFilename=ensureHtmlFilename(p.filename||"supersearch.html");
  state.settings.columns=cleanColumnCount(p.columns);
  state.settings.colours=cleanColourStyle(p.colours||"primary");
  state.settings.palette=state.settings.colours==="pastel"?{...pastelPalette}:{...defaultPalette};
  state.settings.showTitle=cleanShowTitle(p.showTitle);
  state.settings.openMode=cleanOpenMode(p.openMode);
  const columnCount=state.settings.columns;
  state.menu.columns=makeColumns(columnCount);
  assignMissingSectionColumns(p);
  // Place each included section into its stored column, preserving array order so the
  // exported page matches the editor exactly.
  (p.sections||[]).filter(s=>s.included!==false).forEach(section=>{
    const colour=cleanColour(section.colour||"blue");
    const block=[{type:"header",text:section.name||"Section",color:colour}];
    (section.engines||[]).filter(en=>en.included!==false).forEach(en=>{
      block.push({type:"link",text:en.label||"Engine",template:en.template||"",color:cleanColour(en.colour||colour)});
    });
    const colIndex=(cleanSectionColumn(section.column,columnCount)||1)-1;
    state.menu.columns[colIndex].items.push(...block);
  });
  ensureColumnCount(state.menu,state.settings.columns);
  return state;
}
function getCurrentState(){return projectToInternalState(project);}
function downloadBlob(content,filename,type){const blob=new Blob([content],{type});const url=URL.createObjectURL(blob);const a=document.createElement("a");a.href=url;a.download=filename;document.body.appendChild(a);a.click();a.remove();URL.revokeObjectURL(url);}
function setStatus(m){document.getElementById("status").textContent=m;}
function hasBrowserSave(){try{return !!localStorage.getItem(STORAGE_KEY);}catch(e){return false;}}
function updateRestoreButton(){const b=document.getElementById("restoreSavedBtn");if(b)b.hidden=!hasBrowserSave();}
function saveToBrowser(){try{localStorage.setItem(STORAGE_KEY,JSON.stringify(project));updateRestoreButton();}catch(e){}}
function loadFromBrowser(){try{const raw=localStorage.getItem(STORAGE_KEY);if(!raw)return null;return normaliseFriendlyProject(JSON.parse(raw));}catch(e){return null;}}
function colourOptions(selected){return allowedColours.map(c=>`<option value="${c}" ${c===selected?"selected":""}>${c}</option>`).join("");}
function scheduleRender(save=true,mode="all"){if(save)saveToBrowser();if(mode==="all")renderQueuedMode="all";else if(!renderQueued)renderQueuedMode="preview";if(renderQueued)return;renderQueued=true;requestAnimationFrame(()=>{const m=renderQueuedMode;renderQueued=false;renderQueuedMode="all";if(m==="preview")renderPreview();else renderAll();});}

let editorCollapsed=false;
function applyEditorCollapseState(){
  const container=document.getElementById("sectionList");
  if(!container)return;
  container.classList.toggle("editor-collapsed",editorCollapsed);
  const expandButton=document.getElementById("expandEditorBtn");
  const collapseButton=document.getElementById("collapseEditorBtn");
  if(expandButton)expandButton.disabled=!editorCollapsed;
  if(collapseButton)collapseButton.disabled=editorCollapsed||!project.sections.length;
}
function setEditorCollapsed(collapsed){
  editorCollapsed=Boolean(collapsed);

  setStatus(editorCollapsed?"Editor sections collapsed. Section controls stay visible for easier reordering.":"Editor sections expanded.");
}
function renderEditor(){
  const container=document.getElementById("sectionList");
  if(!project.sections.length){container.innerHTML=`<div class="section-card"><div class="engines"><div class="empty-engines">No sections yet. Use “Add section” to start.</div></div></div>`;applyEditorCollapseState();return;}
  normaliseSectionOrder(project);
  const columnCount=cleanColumnCount(project.columns);
  const sectionCardHtml=(section,si)=>{
    const included=section.included!==false;
    const engineCount=(section.engines||[]).length;
    const engineLabel=engineCount===1?"1 search":`${engineCount} searches`;
    const sectionColumn=cleanSectionColumn(section.column,project.columns)||1;
    const canMoveUp=findSectionIndexInColumn(si,-1)!==-1;
    const canMoveDown=findSectionIndexInColumn(si,1)!==-1;
    const canMoveLeft=sectionColumn>1;
    const canMoveRight=sectionColumn<columnCount;
    const rows=(section.engines||[]).map((en,li)=>{
      const usable=E.isUsableLink(en.template);
      const isStatic=E.isStaticLink(en.template);
      const kindBadge=isStatic?`<span class="link-kind" title="Static link: always live, no query needed">link</span>`:`<span class="link-kind search" title="Search: opens with the typed query">search</span>`;
      return `
      <div class="engine-row ${usable?"":"invalid"}" data-section-index="${si}" data-engine-index="${li}">
        <span class="drag-handle" draggable="true" title="Drag to reorder" aria-label="Drag to reorder">↕</span>
        <input type="text" value="${escapeHtml(en.label||"")}" data-action="engine-label" aria-label="Label" placeholder="Label">
        <input type="text" value="${escapeHtml(en.template||"")}" data-action="engine-template" aria-label="Search template URL with %s, or a plain link" placeholder="https://…?q=%s  or a plain URL">
        ${kindBadge}
        <select data-action="engine-colour" aria-label="Colour">${colourOptions(cleanColour(en.colour||section.colour))}</select>
        <div class="engine-actions">
          <button type="button" class="mini secondary" data-action="move-engine-up" ${li===0?"disabled":""}>↑</button>
          <button type="button" class="mini secondary" data-action="move-engine-down" ${li===(section.engines||[]).length-1?"disabled":""}>↓</button>
          <button type="button" class="mini danger" data-action="delete-engine">Remove</button>
        </div>
      </div>`;
    }).join("")||`<div class="empty-engines" data-empty-drop="${si}">No searches in this section yet. Drag a search here to move it in.</div>`;
    return `
      <article class="section-card ${included?"":"excluded"}" data-section-index="${si}">
        <div class="section-head">
          <span class="section-drag-handle" draggable="true" title="Drag to reorder this section within column ${sectionColumn}" aria-label="Drag to reorder this section within column ${sectionColumn}">☰</span>
          <label class="toggle-line"><input type="checkbox" data-action="toggle-section" ${included?"checked":""}> Use</label>
          <div class="section-title">
            <input type="text" value="${escapeHtml(section.name||"")}" data-action="section-name" aria-label="Section name">
            <select data-action="section-colour" aria-label="Section colour">${colourOptions(cleanColour(section.colour||"blue"))}</select>
          </div>
          <span class="section-count">${escapeHtml(engineLabel)} · Col ${sectionColumn}</span>
          <div class="section-controls">
            <button type="button" class="mini secondary" data-action="move-section-up" title="Move up within column ${sectionColumn}" ${canMoveUp?"":"disabled"}>↑</button>
            <button type="button" class="mini secondary" data-action="move-section-down" title="Move down within column ${sectionColumn}" ${canMoveDown?"":"disabled"}>↓</button>
            <button type="button" class="mini secondary" data-action="move-section-left" title="Move one column left" ${canMoveLeft?"":"disabled"}>←</button>
            <button type="button" class="mini secondary" data-action="move-section-right" title="Move one column right" ${canMoveRight?"":"disabled"}>→</button>
            <button type="button" class="mini secondary" data-action="duplicate-section">Copy</button>
            <button type="button" class="mini danger" data-action="delete-section">Delete</button>
          </div>
        </div>
        ${included?"":`<div class="empty-engines">This section is kept in the editor but is not currently used in the preview/export.</div>`}
        <div class="engines">${rows}</div>
        <div class="section-foot">
          <button type="button" class="mini secondary" data-action="add-engine">+ Add search</button>
          <button type="button" class="mini secondary" data-action="toggle-add-panel">+ Add from a search link</button>
          <button type="button" class="mini secondary" data-action="toggle-site-panel">+ Add a site search</button>
        </div>
        <div class="add-link-panel" data-add-panel="${si}">
          <div class="row">
            <input type="text" data-conv="phrase" placeholder="Two-word phrase you searched, e.g. climate migration" value="climate migration">
          </div>
          <div class="row">
            <input type="text" data-conv="url" placeholder="Paste the results-page link, e.g. https://…?q=climate+migration">
            <button type="button" class="mini secondary" data-action="convert-add">Convert &amp; add</button>
          </div>
          <div class="conv-msg" data-conv="msg"></div>
        </div>
        <div class="add-link-panel" data-site-panel="${si}">
          <div class="row">
            <input type="text" data-site="domain" placeholder="Website address, e.g. economist.com or bbc.co.uk">
            <label style="font-size:11px;display:inline-flex;gap:4px;align-items:center;font-weight:700;color:#475569"><input type="checkbox" data-site="uk"> UK Google</label>
            <button type="button" class="mini secondary" data-action="site-add">Add site search</button>
          </div>
          <div class="conv-msg" data-site="msg">Searches the site through Google — useful when a site has poor or no search of its own.</div>
        </div>
      </article>`;
  };
  const parts=[];
  for(let column=1;column<=columnCount;column++){
    const sectionsInColumn=project.sections
      .map((section,si)=>({section,si}))
      .filter(entry=>(cleanSectionColumn(entry.section.column,project.columns)||1)===column);
    const label=sectionsInColumn.length===1?"1 section":`${sectionsInColumn.length} sections`;
    parts.push(`<div class="editor-column-heading">Column ${column} · ${label}</div>`);
    if(sectionsInColumn.length){
      sectionsInColumn.forEach(entry=>parts.push(sectionCardHtml(entry.section,entry.si)));
    }else{
      parts.push(`<div class="editor-column-empty">No sections in column ${column}. Use ←/→ on a section to move it here.</div>`);
    }
  }
  container.innerHTML=parts.join("");
  applyEditorCollapseState();
}

/* Editor events */
function onSectionListInput(event){
  const row=event.target.closest("[data-section-index]");
  if(!row)return;
  const si=Number(row.getAttribute("data-section-index"));
  const section=project.sections[si];
  if(!section)return;
  const action=event.target.getAttribute("data-action");
  if(action==="section-name"){section.name=event.target.value;schedulePreviewRender();}
  else if(action==="section-colour"){const old=section.colour;section.colour=cleanColour(event.target.value);(section.engines||[]).forEach(en=>{if(!en.colour||en.colour===old)en.colour=section.colour;});scheduleRender();}
  else if(action==="toggle-section"){section.included=event.target.checked;scheduleRender();}
  else{
    const enRow=event.target.closest("[data-engine-index]");
    if(!enRow)return;
    const li=Number(enRow.getAttribute("data-engine-index"));
    const en=(section.engines||[])[li];
    if(!en)return;
    if(action==="engine-label"){en.label=event.target.value;schedulePreviewRender();}
    else if(action==="engine-template"){en.template=event.target.value;enRow.classList.toggle("invalid",!E.isUsableLink(en.template));schedulePreviewRender();}
    else if(action==="engine-colour"){en.colour=cleanColour(event.target.value);schedulePreviewRender();}
  }
}
function onSectionListClick(event){
  const btn=event.target.closest("button");
  const headerToggle=event.target.closest("[data-action='toggle-add-panel']");
  const siteToggle=event.target.closest("[data-action='toggle-site-panel']");
  if(headerToggle){
    const card=headerToggle.closest("[data-section-index]");
    card.querySelector(".add-link-panel[data-add-panel]").classList.toggle("show");
    return;
  }
  if(siteToggle){
    const card=siteToggle.closest("[data-section-index]");
    card.querySelector(".add-link-panel[data-site-panel]").classList.toggle("show");
    return;
  }
  if(!btn)return;
  const action=btn.getAttribute("data-action");
  const row=btn.closest("[data-section-index]");
  if(!row)return;
  const si=Number(row.getAttribute("data-section-index"));
  const section=project.sections[si];
  if(action==="add-engine"){section.engines=section.engines||[];section.engines.push({label:"New search",template:"https://www.google.com/search?q=%s",colour:section.colour,included:true});scheduleRender();return;}
  if(action==="convert-add"){
    const card=btn.closest("[data-section-index]");
    const phrase=card.querySelector("[data-conv='phrase']").value;
    const url=card.querySelector("[data-conv='url']").value;
    const msg=card.querySelector("[data-conv='msg']");
    const r=E.convert(url,phrase);
    msg.className="conv-msg "+(r.ok?"ok":"bad");
    msg.textContent=r.message+(r.tip?" "+r.tip:"");
    if(r.ok){
      const label=E.suggestLabel(r.template)||"New search";
      section.engines=section.engines||[];
      section.engines.push({label:label,template:r.template,colour:section.colour,included:true});
      card.querySelector("[data-conv='url']").value="";
      scheduleRender();
      setStatus("Added "+label+" from a search link.");
    }
    return;
  }
  if(action==="site-add"){
    const card=btn.closest("[data-section-index]");
    const domain=card.querySelector("[data-site='domain']").value;
    const uk=card.querySelector("[data-site='uk']").checked;
    const msg=card.querySelector("[data-site='msg']");
    const r=E.siteSearchTemplate(domain,{uk:uk});
    msg.className="conv-msg "+(r.ok?"ok":"bad");
    msg.textContent=r.message;
    if(r.ok){
      const label=E.suggestLabel(r.template)||r.domain;
      section.engines=section.engines||[];
      section.engines.push({label:label,template:r.template,colour:section.colour,included:true});
      card.querySelector("[data-site='domain']").value="";
      scheduleRender();
      setStatus("Added a site search for "+r.domain+".");
    }
    return;
  }
  if(action==="add-section"){return;}
  if(action==="delete-section"){if(confirm("Delete this section?")){project.sections.splice(si,1);scheduleRender();}return;}
  if(action==="duplicate-section"){const copy=JSON.parse(JSON.stringify(section));copy.name=(section.name||"Section")+" copy";copy.column=cleanSectionColumn(section.column,project.columns)||1;project.sections.splice(si+1,0,copy);scheduleRender();return;}
  if(action==="move-section-up"){if(moveSectionWithinColumn(si,-1))scheduleRender();return;}
  if(action==="move-section-down"){if(moveSectionWithinColumn(si,1))scheduleRender();return;}
  if(action==="move-section-left"){if(moveSectionSideways(si,-1)){scheduleRender();setStatus("Moved section one column left.");}return;}
  if(action==="move-section-right"){if(moveSectionSideways(si,1)){scheduleRender();setStatus("Moved section one column right.");}return;}
  const enRow=btn.closest("[data-engine-index]");
  if(!enRow)return;
  const li=Number(enRow.getAttribute("data-engine-index"));
  if(action==="delete-engine"){section.engines.splice(li,1);scheduleRender();}
  else if(action==="move-engine-up"&&li>0){[section.engines[li-1],section.engines[li]]=[section.engines[li],section.engines[li-1]];scheduleRender();}
  else if(action==="move-engine-down"&&li<section.engines.length-1){[section.engines[li+1],section.engines[li]]=[section.engines[li],section.engines[li+1]];scheduleRender();}
}

/* Drag reorder of searches (within or across sections) */
let dragInfo=null;
let sectionDragIndex=null;
function onLinkDragStart(e){
  // Dragging is disabled while the editor is collapsed (no rows/targets are visible).
  if(editorCollapsed){e.preventDefault&&e.preventDefault();return;}
  // Section drag takes priority if the section handle was grabbed.
  const sh=e.target.closest(".section-drag-handle");
  if(sh){const card=sh.closest("[data-section-index]");if(card){sectionDragIndex=Number(card.getAttribute("data-section-index"));card.classList.add("section-dragging");e.dataTransfer.effectAllowed="move";try{e.dataTransfer.setData("text/plain","section");}catch(err){}}return;}
  // Search-row drag starts only from the row handle, so text fields stay selectable.
  const h=e.target.closest(".drag-handle");if(!h)return;const row=h.closest("[data-engine-index]");if(!row)return;dragInfo={si:Number(row.getAttribute("data-section-index")),li:Number(row.getAttribute("data-engine-index"))};e.dataTransfer.effectAllowed="move";try{e.dataTransfer.setData("text/plain","drag");}catch(err){}}
function sameColumn(aIndex,bIndex){return (cleanSectionColumn(project.sections[aIndex]?.column,project.columns)||1)===(cleanSectionColumn(project.sections[bIndex]?.column,project.columns)||1);}
function clearLinkDropMarks(){document.querySelectorAll(".engine-row.drag-over,.engine-row.drop-into,.empty-engines.drop-into").forEach(el=>el.classList.remove("drag-over","drop-into"));}
function onLinkDragOver(e){
  // Section reorder (within column only).
  if(sectionDragIndex!=null){const card=e.target.closest("[data-section-index]");if(!card)return;const si=Number(card.getAttribute("data-section-index"));if(si===sectionDragIndex||!sameColumn(si,sectionDragIndex))return;e.preventDefault();card.classList.add("section-drag-over");return;}
  if(!dragInfo)return;
  // Search-row drag: accept any section (cross-section move allowed).
  const row=e.target.closest("[data-engine-index]");
  if(row){e.preventDefault();clearLinkDropMarks();row.classList.add("drag-over");return;}
  const empty=e.target.closest("[data-empty-drop]");
  if(empty){e.preventDefault();clearLinkDropMarks();empty.classList.add("drop-into");return;}
}
function onLinkDragLeave(e){const row=e.target.closest("[data-engine-index]");if(row)row.classList.remove("drag-over");const empty=e.target.closest("[data-empty-drop]");if(empty)empty.classList.remove("drop-into");const card=e.target.closest("[data-section-index]");if(card)card.classList.remove("section-drag-over");}
function onLinkDrop(e){
  // Section reorder within column.
  if(sectionDragIndex!=null){const card=e.target.closest("[data-section-index]");if(card){const target=Number(card.getAttribute("data-section-index"));if(target!==sectionDragIndex&&sameColumn(target,sectionDragIndex)){e.preventDefault();const [moved]=project.sections.splice(sectionDragIndex,1);const adjusted=target>sectionDragIndex?target-1:target;project.sections.splice(adjusted,0,moved);sectionDragIndex=null;scheduleRender();return;}}sectionDragIndex=null;return;}
  if(!dragInfo)return;
  const sourceSection=project.sections[dragInfo.si];
  if(!sourceSection){dragInfo=null;return;}
  // Drop onto a specific row: insert at that row's position (same or different section).
  const row=e.target.closest("[data-engine-index]");
  if(row){
    e.preventDefault();
    const targetSi=Number(row.getAttribute("data-section-index"));
    let targetLi=Number(row.getAttribute("data-engine-index"));
    const [moved]=sourceSection.engines.splice(dragInfo.li,1);
    // If moving down within the same section past the removed item, the index shifts by one.
    if(targetSi===dragInfo.si && targetLi>dragInfo.li) targetLi--;
    project.sections[targetSi].engines.splice(targetLi,0,moved);
    dragInfo=null;scheduleRender();return;
  }
  // Drop onto an empty section: append there.
  const empty=e.target.closest("[data-empty-drop]");
  if(empty){
    e.preventDefault();
    const targetSi=Number(empty.getAttribute("data-empty-drop"));
    const [moved]=sourceSection.engines.splice(dragInfo.li,1);
    (project.sections[targetSi].engines=project.sections[targetSi].engines||[]).push(moved);
    dragInfo=null;scheduleRender();return;
  }
  dragInfo=null;
}
function onLinkDragEnd(){clearLinkDropMarks();document.querySelectorAll(".section-card.section-drag-over,.section-card.section-dragging").forEach(el=>el.classList.remove("section-drag-over","section-dragging"));dragInfo=null;sectionDragIndex=null;}

/* Templates */
let templateFiles={};
function getTemplateFromUrl(){const p=new URLSearchParams(location.search);return p.get("template")||"research";}
async function loadCatalog(){
  try{
    const res=await fetch("templates/catalog.json");
    const cat=await res.json();
    const sel=document.getElementById("templateSelect");
    (cat.templates||[]).forEach(t=>{templateFiles[t.id]=t.file;const o=document.createElement("option");o.value=t.id;o.textContent=t.title;sel.appendChild(o);});
  }catch(e){
    templateFiles={research:"research.json",blank:"blank.json"};
    const sel=document.getElementById("templateSelect");
    [["research","Research Super Search"],["blank","Blank"]].forEach(([id,title])=>{const o=document.createElement("option");o.value=id;o.textContent=title;sel.appendChild(o);});
  }
}
async function loadSelectedTemplate(saveAfterLoad=true){
  const id=document.getElementById("templateSelect").value||"research";
  const file=templateFiles[id]||"research.json";
  try{
    const res=await fetch("templates/"+file);
    const data=await res.json();
    project=normaliseFriendlyProject(data);
    if(saveAfterLoad)saveToBrowser();
    renderAll();
    setStatus("Loaded template: "+(data.title||id)+".");
  }catch(e){
    project=normaliseFriendlyProject(defaultProject());
    renderAll();
    setStatus("Could not load that template; started a blank Super Search.");
  }
}
function loadTemplate(saveAfterLoad=true){return loadSelectedTemplate(saveAfterLoad);}
function restoreBrowserSave(){const p=loadFromBrowser();if(p){project=p;renderAll();setStatus("Restored your saved draft.");}else{setStatus("No saved draft found.");}}

/* Import */
function readTextFile(file,cb){const r=new FileReader();r.onload=e=>cb(String(e.target.result||""));r.readAsText(file);}
function importJsonFile(file){readTextFile(file,text=>{try{project=normaliseFriendlyProject(JSON.parse(text));saveToBrowser();renderAll();setStatus("Imported config.");}catch(e){alert("Could not read that config file: "+e.message);}});}
function colourFromClass(el,suffix){const cls=Array.from(el.classList||[]).find(c=>c.endsWith(suffix));if(!cls)return "blue";return cls.replace(/^ss-/,"").replace(suffix,"");}
function parseMenuHtml(doc,file){
  // Try namespaced markup first (ss-), then fall back to the legacy generic classes.
  const ns = doc.querySelector(".ss-col") ? "ss-" : "";
  const colSel = ns ? ".ss-col" : ".col";
  const hdrParaSel = ns ? "p.ss-hdr-para" : "p.hdr-para";
  const hdrSel = ns ? ".ss-hdr" : ".hdr";
  const btnSel = ns ? "a.ss-btn" : "a.btn";
  const hdrSuffix = "-hdr", btnSuffix = "-btn";
  const tmplAttr = ns ? "data-ss-template" : "data-template";
  const columns=Array.from(doc.querySelectorAll(colSel));
  if(!columns.length)throw new Error("No Super Search columns were found.");
  const sections=[];
  columns.forEach(col=>{
    let current=null;
    Array.from(col.children).forEach(el=>{
      const header=el.matches(hdrParaSel)?el.querySelector(hdrSel):(el.matches(hdrSel)?el:null);
      if(header){current={name:(header.textContent||"Section").replace(/open all.*/i,"").trim(),colour:colourFromClass(header,hdrSuffix),included:true,engines:[]};sections.push(current);return;}
      if(el.matches(btnSel)){if(!current){current={name:"Searches",colour:colourFromClass(el,btnSuffix),included:true,engines:[]};sections.push(current);}current.engines.push({label:(el.textContent||"Search").trim(),template:el.getAttribute(tmplAttr)||"",colour:colourFromClass(el,btnSuffix)||current.colour,included:true});}
    });
  });
  if(!sections.length)throw new Error("No sections or searches found.");
  const A=name=>{const b=doc.body;if(!b)return null;return b.getAttribute("data-ss-"+name)!=null?b.getAttribute("data-ss-"+name):b.getAttribute("data-"+name);};
  const openMode=A("open-mode")||"links";
  const colours=A("colours")||"primary";
  const cols=A("columns")||columns.length||DEFAULT_COLUMNS;
  const showTitle=A("show-title")!=="false";
  return normaliseFriendlyProject({title:(doc.title||"Imported Super Search").trim(),filename:ensureHtmlFilename(file.name||"supersearch.html"),columns:cols,colours:colours,showTitle:showTitle,openMode:openMode,sections});
}
function importHtmlPage(file){
  readTextFile(file,html=>{
    try{
      const doc=new DOMParser().parseFromString(html,"text/html");
      // 1) Prefer the embedded, lossless menu config.
      const embed=doc.getElementById("ss-menu-config");
      if(embed&&embed.textContent.trim()){
        try{
          const cfg=JSON.parse(embed.textContent);
          project=normaliseFriendlyProject(cfg);
          if(file&&file.name)project.filename=ensureHtmlFilename(file.name);
          saveToBrowser();renderAll();setStatus("Loaded Super Search page (from embedded config).");
          return;
        }catch(e){ /* fall through to HTML parsing */ }
      }
      // 2) Parse visible markup (namespaced, or 3) legacy generic classes).
      project=parseMenuHtml(doc,file);
      saveToBrowser();renderAll();setStatus("Loaded existing Super Search page.");
    }catch(err){alert("Could not load that page: "+err.message);}
  });
}

function initialiseEvents(){
  document.getElementById("titleInput").addEventListener("input",e=>{project.title=e.target.value;schedulePreviewRender();});
  document.getElementById("filenameInput").addEventListener("input",e=>{project.filename=e.target.value;schedulePreviewRender();});
  document.getElementById("descriptionInput").addEventListener("input",e=>{project.description=e.target.value;schedulePreviewRender();});
  document.getElementById("columnsInput").addEventListener("change",e=>{setProjectColumnCount(e.target.value);setStatus(`Layout set to ${project.columns} columns.`);scheduleRender();});
  document.getElementById("coloursInput").addEventListener("change",e=>{project.colours=cleanColourStyle(e.target.value);schedulePreviewRender();});
  document.getElementById("openModeInput").addEventListener("change",e=>{project.openMode=cleanOpenMode(e.target.value);setStatus(project.openMode==="openAll"?"Open-all buttons enabled (browser may ask to allow pop-ups).":"Links mode: buttons open one engine each.");schedulePreviewRender();});
  document.getElementById("showTitleInput").addEventListener("change",e=>{project.showTitle=e.target.checked;schedulePreviewRender();});
  const list=document.getElementById("sectionList");
  list.addEventListener("input",onSectionListInput);
  list.addEventListener("change",onSectionListInput);
  list.addEventListener("click",onSectionListClick);
  list.addEventListener("dragstart",onLinkDragStart);
  list.addEventListener("dragover",onLinkDragOver);
  list.addEventListener("dragleave",onLinkDragLeave);
  list.addEventListener("drop",onLinkDrop);
  list.addEventListener("dragend",onLinkDragEnd);
  document.getElementById("addSectionBtn").addEventListener("click",()=>{project.sections.push({name:"New section",colour:"blue",included:true,column:null,engines:[{label:"Google",template:"https://www.google.com/search?q=%s",colour:"blue",included:true}]});assignMissingSectionColumns(project);scheduleRender();});
  document.getElementById("includeAllBtn").addEventListener("click",()=>{project.sections.forEach(s=>s.included=true);scheduleRender();});
  document.getElementById("excludeAllBtn").addEventListener("click",()=>{project.sections.forEach(s=>s.included=false);scheduleRender();});
  document.getElementById("expandEditorBtn").addEventListener("click",()=>setEditorCollapsed(false));
  document.getElementById("collapseEditorBtn").addEventListener("click",()=>setEditorCollapsed(true));
  const fromUrl=getTemplateFromUrl();
  document.getElementById("templateSelect").addEventListener("change",()=>setStatus("Template selected. Click Use template to replace the current menu."));
  document.getElementById("loadTemplateBtn").addEventListener("click",()=>{if(confirm("Use the selected template? This replaces the current menu in this browser."))loadTemplate(true);});
  document.getElementById("exportHtmlBtn").addEventListener("click",()=>{const state=getCurrentState();downloadBlob(exportClassicStandaloneHtml(state,project),ensureHtmlFilename(project.filename||state.settings.menuFilename),"text/html");setStatus("Saved Super Search page.");});
  document.getElementById("exportConfigBtn").addEventListener("click",()=>{const filename=ensureHtmlFilename(project.filename||"supersearch.html").replace(/\.html?$/i,"-config.json");downloadBlob(JSON.stringify(project,null,2),filename,"application/json");setStatus("Saved config.");});
  document.getElementById("importConfigInput").addEventListener("change",ev=>{const f=ev.target.files[0];if(f)importJsonFile(f);ev.target.value="";});
  document.getElementById("importHtmlInput").addEventListener("change",ev=>{const f=ev.target.files[0];if(f)importHtmlPage(f);ev.target.value="";});
  document.getElementById("restoreSavedBtn").addEventListener("click",restoreBrowserSave);
  document.getElementById("clearSavedBtn").addEventListener("click",()=>{if(confirm("Clear the previous draft saved in this browser?")){localStorage.removeItem(STORAGE_KEY);updateRestoreButton();setStatus("Previous draft cleared.");}});
  updateRestoreButton();
  return fromUrl;
}

(async function start(){
  await loadCatalog();
  const fromUrl=initialiseEvents();
  if(templateFiles[fromUrl])document.getElementById("templateSelect").value=fromUrl;
  await loadTemplate(false);
})();
</script>
